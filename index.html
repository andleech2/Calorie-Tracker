<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calorie Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Source+Code+Pro:wght@600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 50%, #f0fdfa 100%);
    font-family: 'Inter', sans-serif;
    padding: 24px 16px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #app { width: 100%; max-width: 480px; }

  .header {
    background: linear-gradient(135deg, #0d9488 0%, #2563eb 100%);
    border-radius: 16px 16px 0 0;
    padding: 24px 28px 20px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '🍽️';
    position: absolute;
    right: 20px; top: 10px;
    font-size: 52px;
    opacity: 0.15;
  }
  .header-sub  { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .header-title { font-size: 24px; font-weight: 900; color: white; letter-spacing: -0.01em; }
  .header-date  { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }

  .card {
    background: white;
    border: 2px solid #99f6e4;
    border-top: none;
    padding: 24px 28px 18px;
  }
  .card-last {
    border-radius: 0 0 16px 16px;
    padding: 16px 28px 24px;
  }

  .section-label {
    font-size: 11px; font-weight: 700; color: #0d9488;
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  /* Progress ring area */
  .ring-row { display: flex; align-items: center; gap: 28px; }
  .ring-wrap { position: relative; flex-shrink: 0; width: 128px; height: 128px; }
  .ring-wrap svg { display: block; }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  #ring-total {
    font-size: 26px; font-weight: 900; color: #0f172a;
    font-family: 'Source Code Pro', monospace; line-height: 1;
  }
  .ring-unit { font-size: 10px; color: #94a3b8; margin-top: 2px; font-weight: 600; }

  .stat-label { font-size: 11px; font-weight: 700; color: #0d9488; text-transform: uppercase; letter-spacing: 0.1em; }
  .stat-val   { font-size: 20px; font-weight: 700; color: #0f172a; margin-bottom: 10px; }
  .stat-val span { font-size: 12px; color: #94a3b8; font-weight: 400; }
  #rem-label  { color: #2563eb; }
  #rem-val    { color: #0f172a; }

  #clear-btn {
    font-size: 11px; font-weight: 600; color: #94a3b8;
    background: none; border: 1px solid #e2e8f0;
    border-radius: 6px; padding: 4px 10px; cursor: pointer;
    display: none;
  }

  /* Log */
  #log-section { display: none; }
  .log-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 0; border-bottom: 1px solid #f0f9ff;
  }
  .log-name { font-size: 13px; font-weight: 600; color: #0f172a; }
  .log-meta  { font-size: 11px; color: #94a3b8; margin-left: 6px; }
  .log-btns  { display: flex; align-items: center; gap: 5px; }
  .log-qty   { font-size: 13px; font-weight: 700; color: #0f172a; min-width: 20px; text-align: center; }

  /* Food grid */
  .food-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .food-card {
    border: 1.5px solid #e2e8f0;
    border-radius: 10px; padding: 10px 12px;
    background: #fafafa;
    transition: border-color 0.15s, background 0.15s, opacity 0.15s, transform 0.15s;
    user-select: none;
  }
  .food-card.logged { border-color: #0d9488; background: #f0fdfa; }
  .food-card.dragging { opacity: 0.4; transform: scale(0.97); }
  .food-card.drag-over { border-color: #2563eb !important; background: #eff6ff !important; transform: scale(1.02); }
  .food-header { display: flex; align-items: flex-start; gap: 5px; margin-bottom: 1px; }
  .drag-handle {
    color: #cbd5e1; font-size: 13px; cursor: grab;
    flex-shrink: 0; line-height: 1.2; touch-action: none;
  }
  .drag-handle:active { cursor: grabbing; color: #94a3b8; }
  .food-name { font-size: 13px; font-weight: 700; color: #0f172a; }
  .food-cal  { font-size: 11px; color: #94a3b8; margin-bottom: 8px; }
  .food-row  { display: flex; align-items: center; gap: 5px; }
  .food-qty-input {
    width: 44px; padding: 4px 6px;
    border: 1.5px solid #e2e8f0; border-radius: 6px;
    font-size: 12px; font-weight: 600; color: #0f172a;
    font-family: 'Source Code Pro', monospace;
    outline: none; background: white;
  }
  .add-btn {
    flex: 1; padding: 5px 0;
    background: linear-gradient(135deg, #0d9488, #2563eb);
    color: white; border: none; border-radius: 6px;
    font-size: 11px; font-weight: 700; cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  .ctrl-btn {
    width: 26px; height: 26px;
    border: none; border-radius: 6px;
    font-size: 13px; font-weight: 700;
    cursor: pointer; display: inline-flex;
    align-items: center; justify-content: center;
    padding: 0; font-family: 'Inter', sans-serif;
  }
  .btn-dec  { background: #f1f5f9; color: #0f172a; }
  .btn-inc  { background: #0d9488; color: white; }
  .btn-del  { background: #fee2e2; color: #ef4444; margin-left: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-sub">Daily Tracker</div>
    <div class="header-title">Calorie Counter</div>
    <div class="header-date" id="today-date"></div>
  </div>

  <!-- Progress Ring -->
  <div class="card ring-row">
    <div class="ring-wrap">
      <svg width="128" height="128">
        <circle cx="64" cy="64" r="54" fill="none" stroke="#e0f2fe" stroke-width="10"/>
        <circle id="ring-arc" cx="64" cy="64" r="54" fill="none"
          stroke="#0d9488" stroke-width="10"
          stroke-dasharray="0 339.292"
          stroke-linecap="round"
          transform="rotate(-90 64 64)"
          style="transition: stroke-dasharray 0.4s ease, stroke 0.3s"/>
      </svg>
      <div class="ring-center">
        <span id="ring-total">0</span>
        <span class="ring-unit">cal</span>
      </div>
    </div>
    <div style="flex:1">
      <div class="stat-label">Goal</div>
      <div class="stat-val" id="goal-val">1222 <span>cal</span></div>
      <div class="stat-label" id="rem-label">Remaining</div>
      <div class="stat-val" id="rem-val">1222 <span>cal</span></div>
      <div class="stat-label" style="color:#7c3aed">Carbs</div>
      <div class="stat-val" id="carb-val" style="color:#7c3aed;margin-bottom:12px">0 <span>g</span></div>
      <button id="clear-btn" onclick="clearDay()">Clear Day</button>
    </div>
  </div>

  <!-- Today's Log -->
  <div class="card" id="log-section">
    <div class="section-label">Today's Log</div>
    <div id="log-list"></div>
  </div>

  <!-- Add Food -->
  <div class="card">
    <div class="section-label">Add Food</div>
    <div class="food-grid" id="food-grid"></div>
  </div>

  <!-- New Custom Food -->
  <div class="card card-last">
    <div class="section-label" style="margin-bottom:12px">Add New Food</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input id="new-name" type="text" placeholder="Food name" style="flex:2;min-width:120px;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;color:#0f172a;">
      <input id="new-cal" type="number" placeholder="Cal" min="1" style="width:60px;padding:7px 8px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:'Source Code Pro',monospace;outline:none;color:#0f172a;">
      <input id="new-carb" type="number" placeholder="Carbs g" min="0" step="0.1" style="width:72px;padding:7px 8px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:'Source Code Pro',monospace;outline:none;color:#0f172a;">
      <select id="new-unit" style="flex:1;min-width:80px;padding:7px 8px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;color:#0f172a;background:white;">
        <option value="tbs">tbs</option>
        <option value="each">each</option>
        <option value="can">can</option>
        <option value="bag">bag</option>
        <option value="slice">slice</option>
        <option value="cup">cup</option>
        <option value="oz">oz</option>
        <option value="g">g</option>
      </select>
    </div>
    <button onclick="addCustomFood()" style="margin-top:10px;width:100%;padding:9px;background:linear-gradient(135deg,#0d9488,#2563eb);color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">
      + Save Food
    </button>
    <div id="new-food-error" style="font-size:11px;color:#ef4444;margin-top:6px;display:none;">Please enter a name and calories.</div>
  </div>

</div>

<script>
const GOAL = 1222;
const CIRC = 2 * Math.PI * 54;

const FOODS_BASE = [
  { id: 1,  name: "Hamburger Patty", cal: 380, carb: 0,   unit: "each" },
  { id: 12, name: "Egg",             cal: 80,  carb: 0,   unit: "each" },
  { id: 11, name: "Cheese",          cal: 240, carb: 2,   unit: "slice" },
  { id: 4,  name: "Butter",          cal: 110, carb: 0,   unit: "tbs" },
  { id: 2,  name: "Cacao",           cal: 20,  carb: 3,   unit: "tbs" },
  { id: 3,  name: "Coconut Oil",     cal: 130, carb: 0,   unit: "tbs" },
  { id: 5,  name: "Whey",            cal: 20,  carb: 0.4, unit: "tbs" },
  { id: 13, name: "Beet Root",       cal: 15,  carb: 3,   unit: "tsp" },
  { id: 7,  name: "Sardines",        cal: 150, carb: 0,   unit: "can" },
  { id: 8,  name: "Oysters",         cal: 200, carb: 0,   unit: "can" },
  { id: 6,  name: "Salmon",          cal: 80,  carb: 0,   unit: "can" },
  { id: 9,  name: "Mackerel",        cal: 90,  carb: 0,   unit: "bag" },
  { id: 10, name: "Peanut Butter",   cal: 90,  carb: 3.5, unit: "tbs" },
];

// Load saved order or use default
function loadOrder() {
  try {
    const custom = JSON.parse(localStorage.getItem('food-custom') || '[]');
    const all = [...FOODS_BASE, ...custom];
    const saved = JSON.parse(localStorage.getItem('food-order') || 'null');
    if (saved && saved.length === all.length) {
      const reordered = saved.map(id => all.find(f => f.id === id)).filter(Boolean);
      if (reordered.length === all.length) return reordered;
    }
    return all;
  } catch {}
  return [...FOODS_BASE];
}

function saveOrder() {
  localStorage.setItem('food-order', JSON.stringify(FOODS.map(f => f.id)));
}

function addCustomFood() {
  const nameEl = document.getElementById('new-name');
  const calEl  = document.getElementById('new-cal');
  const carbEl = document.getElementById('new-carb');
  const unitEl = document.getElementById('new-unit');
  const errEl  = document.getElementById('new-food-error');
  const name = nameEl.value.trim();
  const cal  = parseInt(calEl.value);
  const carb = parseFloat(carbEl.value) || 0;
  const unit = unitEl.value;
  if (!name || isNaN(cal) || cal <= 0) { errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  const existing = JSON.parse(localStorage.getItem('food-custom') || '[]');
  const newId = Date.now();
  const newFood = { id: newId, name, cal, carb, unit, custom: true };
  existing.push(newFood);
  localStorage.setItem('food-custom', JSON.stringify(existing));

  FOODS.push(newFood);
  saveOrder();

  nameEl.value = ''; calEl.value = ''; carbEl.value = ''; unitEl.value = 'tbs';
  renderGrid();
  render();
}

let FOODS = loadOrder();

const todayKey = () => `callog:${new Date().toISOString().slice(0,10)}`;
let log = JSON.parse(localStorage.getItem(todayKey()) || '[]');

function save() {
  localStorage.setItem(todayKey(), JSON.stringify(log));
}

function totalCal() {
  return log.reduce((s, e) => {
    const f = FOODS_BASE.find(f => f.id === e.foodId) || FOODS.find(f => f.id === e.foodId);
    return s + (f ? f.cal * e.qty : 0);
  }, 0);
}

function totalCarbs() {
  return log.reduce((s, e) => {
    const f = FOODS_BASE.find(f => f.id === e.foodId) || FOODS.find(f => f.id === e.foodId);
    return s + (f ? (f.carb || 0) * e.qty : 0);
  }, 0);
}

function updateRing() {
  const total = totalCal();
  const over = total > GOAL;
  const pct = Math.min(total / GOAL, 1);
  document.getElementById('ring-total').textContent = total;
  document.getElementById('ring-total').style.color = over ? '#ef4444' : '#0f172a';
  document.getElementById('ring-arc').setAttribute('stroke-dasharray', `${pct * CIRC} ${CIRC}`);
  document.getElementById('ring-arc').setAttribute('stroke', over ? '#ef4444' : '#0d9488');
  const remLabel = document.getElementById('rem-label');
  const remVal = document.getElementById('rem-val');
  const diff = Math.abs(GOAL - total);
  remLabel.textContent = over ? 'Over by' : 'Remaining';
  remLabel.style.color = over ? '#ef4444' : '#2563eb';
  remVal.innerHTML = `${diff} <span>cal</span>`;
  remVal.style.color = over ? '#ef4444' : '#0f172a';
  document.getElementById('clear-btn').style.display = log.length ? 'inline-block' : 'none';

  const carbs = totalCarbs();
  document.getElementById('carb-val').innerHTML = `${Math.round(carbs * 10) / 10} <span>g</span>`;
}

function renderLog() {
  const section = document.getElementById('log-section');
  const list = document.getElementById('log-list');
  if (!log.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = log.map(entry => {
    const f = FOODS_BASE.find(f => f.id === entry.foodId);
    if (!f) return '';
    return `
      <div class="log-row">
        <div style="flex:1">
          <span class="log-name">${f.name}</span>
          <span class="log-meta">${entry.qty} ${f.unit} · ${f.cal * entry.qty} cal</span>
        </div>
        <div class="log-btns">
          <button class="ctrl-btn btn-dec" onclick="adjustQty(${f.id}, -1)">−</button>
          <span class="log-qty">${entry.qty}</span>
          <button class="ctrl-btn btn-inc" onclick="adjustQty(${f.id}, 1)">+</button>
          <button class="ctrl-btn btn-del" onclick="removeEntry(${f.id})">✕</button>
        </div>
      </div>`;
  }).join('');
}

function renderGrid() {
  const grid = document.getElementById('food-grid');
  grid.innerHTML = FOODS.map(f => {
    const inLog = log.some(e => e.foodId === f.id);
    const deleteBtn = f.custom ? `<button onclick="deleteCustomFood(${f.id})" title="Delete food" style="background:#fee2e2;color:#ef4444;border:none;border-radius:5px;width:22px;height:22px;font-size:11px;cursor:pointer;flex-shrink:0;font-weight:700;">✕</button>` : '';
    return `
      <div class="food-card ${inLog ? 'logged' : ''}" id="fc-${f.id}" data-id="${f.id}">
        <div class="food-header">
          <span class="drag-handle" title="Drag to reorder">⠿</span>
          <span class="food-name" style="flex:1">${f.name}</span>
          ${deleteBtn}
        </div>
        <div class="food-cal">${f.cal} cal / ${f.unit}</div>
        <div class="food-row">
          <input class="food-qty-input" id="qty-${f.id}" type="number" min="0.5" step="0.5" value="1">
          <button class="add-btn" onclick="addEntry(${f.id})">+ Add</button>
        </div>
      </div>`;
  }).join('');
  initDragDrop();
}

function render() {
  updateRing();
  renderLog();
  FOODS.forEach(f => {
    const card = document.getElementById(`fc-${f.id}`);
    if (card) {
      const inLog = log.some(e => e.foodId === f.id);
      card.className = `food-card ${inLog ? 'logged' : ''}`;
      card.setAttribute('data-id', f.id);
    }
  });
}

function addEntry(foodId) {
  const input = document.getElementById(`qty-${foodId}`);
  const qty = parseFloat(input.value);
  if (isNaN(qty) || qty <= 0) return;
  const idx = log.findIndex(e => e.foodId === foodId);
  if (idx >= 0) log[idx].qty += qty;
  else log.push({ foodId, qty });
  input.value = 1;
  save(); render(); renderLog();
}

function removeEntry(foodId) {
  log = log.filter(e => e.foodId !== foodId);
  save(); render(); renderLog();
}

function adjustQty(foodId, delta) {
  const idx = log.findIndex(e => e.foodId === foodId);
  if (idx < 0) return;
  log[idx].qty = Math.max(0, log[idx].qty + delta);
  if (log[idx].qty === 0) log.splice(idx, 1);
  save(); render(); renderLog();
}

function clearDay() {
  log = []; save(); render(); renderLog();
}

function deleteCustomFood(foodId) {
  FOODS = FOODS.filter(f => f.id !== foodId);
  const custom = JSON.parse(localStorage.getItem('food-custom') || '[]').filter(f => f.id !== foodId);
  localStorage.setItem('food-custom', JSON.stringify(custom));
  saveOrder();
  removeEntry(foodId);
  renderGrid();
  render();
}

// ── Drag & Drop ──────────────────────────────────────────
let dragSrcId = null;

function initDragDrop() {
  const grid = document.getElementById('food-grid');

  grid.querySelectorAll('.food-card').forEach(card => {
    const handle = card.querySelector('.drag-handle');

    // Desktop drag
    handle.addEventListener('mousedown', () => { card.setAttribute('draggable', 'true'); });
    card.addEventListener('dragend', () => { card.setAttribute('draggable', 'false'); });

    card.addEventListener('dragstart', e => {
      dragSrcId = parseInt(card.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => card.classList.add('dragging'), 0);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      grid.querySelectorAll('.food-card').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      grid.querySelectorAll('.food-card').forEach(c => c.classList.remove('drag-over'));
      if (parseInt(card.dataset.id) !== dragSrcId) card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      const targetId = parseInt(card.dataset.id);
      if (targetId === dragSrcId) return;
      const srcIdx = FOODS.findIndex(f => f.id === dragSrcId);
      const tgtIdx = FOODS.findIndex(f => f.id === targetId);
      const [moved] = FOODS.splice(srcIdx, 1);
      FOODS.splice(tgtIdx, 0, moved);
      saveOrder();
      renderGrid();
      render();
    });

    // Touch drag
    let touchClone = null, touchStartX, touchStartY, touchSrcId;

    handle.addEventListener('touchstart', e => {
      touchSrcId = parseInt(card.dataset.id);
      const touch = e.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      const rect = card.getBoundingClientRect();
      touchClone = card.cloneNode(true);
      touchClone.style.cssText = `
        position:fixed; left:${rect.left}px; top:${rect.top}px;
        width:${rect.width}px; opacity:0.85; pointer-events:none;
        z-index:9999; border-radius:10px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        transition: none;
      `;
      document.body.appendChild(touchClone);
      card.classList.add('dragging');
      e.preventDefault();
    }, { passive: false });

    handle.addEventListener('touchmove', e => {
      if (!touchClone) return;
      const touch = e.touches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      touchClone.style.transform = `translate(${dx}px, ${dy}px)`;

      // Highlight target
      touchClone.style.display = 'none';
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      touchClone.style.display = '';
      const target = el && el.closest('.food-card');
      grid.querySelectorAll('.food-card').forEach(c => c.classList.remove('drag-over'));
      if (target && parseInt(target.dataset.id) !== touchSrcId) {
        target.classList.add('drag-over');
      }
      e.preventDefault();
    }, { passive: false });

    handle.addEventListener('touchend', e => {
      if (!touchClone) return;
      const touch = e.changedTouches[0];
      touchClone.style.display = 'none';
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      touchClone.style.display = '';
      const target = el && el.closest('.food-card');
      document.body.removeChild(touchClone);
      touchClone = null;
      card.classList.remove('dragging');
      grid.querySelectorAll('.food-card').forEach(c => c.classList.remove('drag-over'));

      if (target) {
        const targetId = parseInt(target.dataset.id);
        if (targetId !== touchSrcId) {
          const srcIdx = FOODS.findIndex(f => f.id === touchSrcId);
          const tgtIdx = FOODS.findIndex(f => f.id === targetId);
          const [moved] = FOODS.splice(srcIdx, 1);
          FOODS.splice(tgtIdx, 0, moved);
          saveOrder();
          renderGrid();
          render();
        }
      }
    });
  });
}

// Init
document.getElementById('today-date').textContent =
  new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

renderGrid();
render();
renderLog();
</script>
</body>
</html>
